<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>µMMC: Cloud Control and Monitoring System (CCAMS)</title>

  <!-- Bootstrap 4.0 CSS (CDN) -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
        crossorigin="anonymous">

  <!-- Minimal styling inspired by Bootstrap 4 Dashboard example -->
  <style>
    body { background: #fff; }
    .sidebar {
      position: fixed;
      top: 56px; /* navbar height */
      bottom: 0;
      left: 0;
      z-index: 100;
      padding: 20px 0;
      overflow-x: hidden;
      overflow-y: auto;
      border-right: 1px solid #eee;
      background: #f8f9fa;
    }
    .sidebar .nav-link { color: #333; }
    .sidebar .nav-link.active { font-weight: 600; color: #007bff; }
    main { padding-top: 20px; }
    #log {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      min-height: 320px;
    }
  </style>
</head>

<body>

  <!-- Top navbar -->
  <nav class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0">
    <a class="navbar-brand col-sm-3 col-md-2 mr-0" href="#">µMMC: Cloud Control and Monitoring System (CCAMS)</a>
<ul class="navbar-nav px-3 ml-auto">
      <li class="nav-item text-nowrap">
        <a class="nav-link" href="#" onclick="return false;">Version: 0.1</a>
      </li>
    </ul>
  </nav>

  <div class="container-fluid">
    <div class="row">

      <!-- Sidebar -->
      <nav class="col-md-2 d-none d-md-block sidebar">
        <div class="sidebar-sticky px-3">
          <h6 class="text-uppercase text-muted">Menu</h6>
          <ul class="nav flex-column mb-2">
            <li class="nav-item">
              <a class="nav-link active" href="#" onclick="return false;">
                Active Link

              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="return false;">
               Inactive Link
              </a>
            </li>
          </ul>

          <div class="mt-4 px-3">
            <button id="send" class="btn btn-outline-primary btn-block" disabled>Send: TEST</button>
            <button id="send1" class="btn btn-outline-primary btn-block" disabled>Send: Led ON</button>
            <button id="send2" class="btn btn-outline-primary btn-block" disabled>Send: Led OFF</button>
          </div>

</div>
      </nav>

      <!-- Main content -->
      <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-4">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
          <h1 class="h3 mb-0">Serial Console</h1>
</div>

        <!-- Controls card -->
        <div class="card mb-3">
          <div class="card-body">
            <form class="form-inline">
              <div class="form-group mb-2 mr-3">
                <label for="baud" class="mr-2 mb-0">Baud Rate</label>
                <select id="baud" class="custom-select">
                  <option value="300">300</option>
                  <option value="600">600</option>
                  <option value="1200">1200</option>
                  <option value="2400">2400</option>
                  <option value="4800">4800</option>
                  <option value="9600">9600</option>
                  <option value="19200">19200</option>
                  <option value="38400">38400</option>
                  <option value="57600">57600</option>
                  <option value="115200" selected>115200</option>
                  <option value="230400">230400</option>
                  <option value="460800">460800</option>
                  <option value="921600">921600</option>
                </select>
              </div>

              <button id="connect" type="button" class="btn btn-primary mb-2">Connect</button>
</form>
          </div>
        </div>

        <!-- Log output -->
        <div class="card">
          <div class="card-header d-flex align-items-center justify-content-between">
            <span>Live Output</span>
            <span id="statusText">Disconnected</span>
            <button id="clearLog" class="btn btn-sm btn-outline-secondary" type="button">Clear</button>
          </div>
          <div class="card-body">
            <textarea id="log" class="form-control" readonly></textarea>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Bootstrap 4 JS (optional, but included to match example elements) -->
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
          integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
          crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"
          integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
          crossorigin="anonymous"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
          integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
          crossorigin="anonymous"></script>

  <!-- Keep the dynamic functionality (IDs + logic) -->
  <script>
    const connectBtn = document.getElementById("connect");
    const baudSelect = document.getElementById("baud");
    const log = document.getElementById("log");
    const statusText = document.getElementById("statusText");
    const clearLogBtn = document.getElementById("clearLog");

    const sendBtn = document.getElementById("send");
        const sendBtn1 = document.getElementById("send1");
            const sendBtn2 = document.getElementById("send2");


    let port;
    let reader;

    function logLine(text) {
      log.value += text + "\n";
      log.scrollTop = log.scrollHeight;
    }

    async function connect() {
      if (!("serial" in navigator)) {
        logLine("Web Serial API not supported.");
        return;
      }

      try {
        const baudRate = Number(baudSelect.value);
        port = await navigator.serial.requestPort();
        await port.open({ baudRate });

        logLine("Connected @ " + baudRate + " baud");
        statusText.textContent = "Connected";

        connectBtn.disabled = true;
        baudSelect.disabled = true;
        sendBtn.disabled = false;
        sendBtn1.disabled = false;
        sendBtn2.disabled = false;

        readLoop();
      } catch (err) {
        logLine("Connection error: " + err);
        statusText.textContent = "Disconnected";
      }
    }

    async function readLoop() {
      const decoder = new TextDecoderStream();
      const readableClosed = port.readable.pipeTo(decoder.writable);
      reader = decoder.readable.getReader();

      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          if (value) logLine(value.trimEnd());
        }
      } catch (err) {
        logLine("Read error: " + err);
      } finally {
        try { reader.releaseLock(); } catch {}
        try { await readableClosed; } catch {}
      }
    }

    async function sendTest() {
      if (!port?.writable) return;
      const writer = port.writable.getWriter();
      await writer.write(new TextEncoder().encode("Test"));
      writer.releaseLock();
      logLine("Test");
    }
    async function sendLedON() {
      if (!port?.writable) return;
      const writer = port.writable.getWriter();
      await writer.write(new TextEncoder().encode("1"));
      writer.releaseLock();
      logLine("1");
    }
        async function sendLedOFF() {
      if (!port?.writable) return;
      const writer = port.writable.getWriter();
      await writer.write(new TextEncoder().encode("0"));
      writer.releaseLock();
      logLine("0");
    }

    connectBtn.onclick = connect;
    
    sendBtn.onclick = sendTest;
        sendBtn1.onclick = sendLedON;
            sendBtn2.onclick = sendLedOFF;

    clearLogBtn.onclick = () => {
      log.value = "";
    };
  </script>
</body>
</html>
