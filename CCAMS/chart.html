<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Line Chart – Add Data Points</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 24px;
      background: #ffffff;
    }
    .container {
      max-width: 900px;
      margin: auto;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
    }
    canvas {
      max-height: 420px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Line Chart (Chart.js)</h2>

    <div class="controls">
      <input type="text" id="xVal" placeholder="X value" required>
      <input type="number" id="yVal" placeholder="Y value" step="any" required>
      <button id="addPoint">Submit</button>
      <button id="clearChart">Clear</button>
    </div>

    <canvas id="chart"></canvas>
  </div>

  <script>
    const ctx = document.getElementById('chart');

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        datasets: [{
          label: 'Data',
          data: [],
          tension: 0.25,
          pointRadius: 4
        }]
      },
      options: {
        parsing: false,
        scales: {
          x: {
            type: 'linear',
            title: { display: true, text: 'X' }
          },
          y: {
            title: { display: true, text: 'Y' }
          }
        }
      }
    });

    document.getElementById('addPoint').onclick = () => {
      const x = Number(document.getElementById('xVal').value);
      const y = Number(document.getElementById('yVal').value);

      if (isNaN(x) || isNaN(y)) return;

      chart.data.datasets[0].data.push({ x, y });
      chart.data.datasets[0].data.sort((a, b) => a.x - b.x);
      chart.update();
    };

    document.getElementById('clearChart').onclick = () => {
      chart.data.datasets[0].data = [];
      chart.update();
    };
  </script>
</body>
</html>
